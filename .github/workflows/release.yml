name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

env:
  GO_VERSION: "1.26"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'autorelease')
    steps:
      - name: Extract version from branch
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TAG=$(echo "$BRANCH" | sed 's|^release/||')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing: $TAG"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Extract release notes from changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"
          {
            echo "## brizz-code ${TAG}"
            echo ""
            echo "### Install / Update"
            echo ""
            echo '```bash'
            echo "brew install brizzai/tap/brizz-code"
            echo '```'
            echo ""
            echo "Or via shell script:"
            echo ""
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/brizzai/brizz-code/master/install.sh | bash"
            echo '```'
            echo ""
            echo "---"
            echo ""
            awk -v ver="$VERSION" '
              /^## \[/{
                if (found) exit
                if (index($0, "[" ver "]")) { found=1; next }
              }
              found { print }
            ' CHANGELOG.md
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Bundle Chrome extension
        run: zip -r chrome-extension.zip chrome-extension/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}

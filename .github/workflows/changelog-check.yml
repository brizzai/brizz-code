name: Changelog Check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'no-changelog') && !contains(github.event.pull_request.labels.*.name, 'autorelease')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md was modified
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if git diff --name-only "$BASE" "$HEAD" | grep -q '^CHANGELOG.md$'; then
            echo "✅ CHANGELOG.md updated"
          else
            echo "::error::Missing changelog entry"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  This PR doesn't update CHANGELOG.md."
            echo ""
            echo "  Please add a note under ## [Unreleased]"
            echo "  describing what changed for users."
            echo ""
            echo "  If this change doesn't need a changelog"
            echo "  entry (CI, typos, deps, etc.), comment:"
            echo ""
            echo "    /no-changelog"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

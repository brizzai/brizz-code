name: Changelog Check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'no-changelog') && !contains(github.event.pull_request.labels.*.name, 'autorelease')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for changelog fragment
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if git diff --name-only "$BASE" "$HEAD" | grep -q '^changelog/unreleased/.*\.md$'; then
            echo "✅ Changelog fragment found"
          else
            echo "::error::Missing changelog fragment"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  This PR doesn't have a changelog entry."
            echo ""
            echo "  Add a fragment file in changelog/unreleased/:"
            echo ""
            echo "    changelog/unreleased/my-change.md"
            echo ""
            echo "    ---"
            echo "    type: added|improved|fixed|changed|removed"
            echo "    ---"
            echo "    Description of the change for users"
            echo ""
            echo "  If this change doesn't need a changelog"
            echo "  entry (CI, typos, deps, etc.), comment:"
            echo ""
            echo "    /no-changelog"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

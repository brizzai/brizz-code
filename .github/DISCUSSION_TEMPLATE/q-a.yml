title: "[Q&A] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Ask questions about fleet — setup, usage, workflows, troubleshooting.
        For confirmed bugs, [open an issue](https://github.com/brizzai/fleet/issues/new?template=bug.yml) instead.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
      placeholder: "How do I configure custom workspace commands?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried? What's your setup? Include version (`fleet --version`).
      placeholder: |
        fleet v0.9.0
        macOS 15.3, tmux 3.5

        I tried X but got Y...
    validations:
      required: false

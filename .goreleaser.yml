version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: brizz-code
    main: ./cmd/brizz-code
    binary: brizz-code
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: brizzai
    name: brizz-code
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## brizz-code v{{.Version}}

    TUI for managing multiple Claude Code sessions in parallel.

    ### Install / Update

    ```bash
    curl -fsSL https://raw.githubusercontent.com/brizzai/brizz-code/main/install.sh | bash
    ```
  extra_files:
    - glob: chrome-extension.zip

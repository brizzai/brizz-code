version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: brizz-code
    main: ./cmd/brizz-code
    binary: brizz-code
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

brews:
  - repository:
      owner: brizzai
      name: homebrew-tap
    homepage: https://github.com/brizzai/brizz-code
    description: "TUI for managing multiple Claude Code sessions in parallel"
    license: Apache-2.0
    install: |
      bin.install "brizz-code"
    dependencies:
      - name: tmux
    test: |
      system "#{bin}/brizz-code", "--version"

sboms:
  - artifacts: archive

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true

release:
  github:
    owner: brizzai
    name: brizz-code
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  extra_files:
    - glob: chrome-extension.zip

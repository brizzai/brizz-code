version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: fleet
    main: ./cmd/fleet
    binary: fleet
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

homebrew_casks:
  - name: fleet
    binaries:
      - fleet
    repository:
      owner: brizzai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/brizzai/fleet
    description: "TUI for managing multiple Claude Code sessions in parallel"
    dependencies:
      - formula: tmux

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: brizzai
    name: fleet
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  extra_files:
    - glob: chrome-extension.zip
